name: 每日更新牛熊证街货分布

on:
  schedule:
    # 香港时间 09:30 盘前（UTC+8 → UTC 1:30）
    - cron: '30 1 * * *'
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Run crawler
        run: python cbbc_crawler.py

      - name: Commit and push if changed
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email 'actions@github.com'
          git add cbbc_distribution.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update CBBC distribution $(date -u +%Y-%m-%d)" && git push)
