name: 爬取牛熊證街貨數據

on:
  schedule:
    - cron: '30 1 * * *'   # 每天 UTC 1:30 (香港時間 9:30 開盤前)
  workflow_dispatch:        # 允許手動觸發

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install requests beautifulsoup4
      - name: Run crawler
        env:
          FIREBASE_URL: ${{ secrets.FIREBASE_DATABASE_URL }}  # 可选，若不同项目
        run: python cbbc_crawler.py
