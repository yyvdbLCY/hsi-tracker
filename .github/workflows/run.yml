name: Daily CBBC Crawler
on:
  schedule:
    - cron: '30 11 * * 1-5'   # 香港时间 19:30 (UTC 10:30) 周一至周五
  workflow_dispatch:            # 允许手动触发
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: pip install -r requirements.txt
      - run: python cbbc_crawler.py
