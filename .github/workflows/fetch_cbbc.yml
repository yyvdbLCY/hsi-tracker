name: 法兴牛熊街货每日更新

on:
  workflow_dispatch:
    inputs:
      backfill_date:
        description: '補捉日期 (YYYY-MM-DD)，留空則執行正常爬蟲'
        required: false
        default: ''

jobs:
  run-crawler:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write   # 讓 workflow 可以 commit/push 數據回 main

    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装依赖 (CBBC + Options OI)
        run: |
          pip install requests firebase-admin pandas
          pip install playwright
          playwright install chromium

      - name: 写入 Firebase 密钥
        run: echo '${{ secrets.FIREBASE_KEY }}' > serviceAccountKey.json

      - name: 执行正常爬虫 - CBBC (无补单日期)
        if: github.event.inputs.backfill_date == ''
        run: python cbbc_crawler.py

      - name: 执行补单爬虫 - CBBC (指定日期)
        if: github.event.inputs.backfill_date != ''
        run: python backfill.py ${{ github.event.inputs.backfill_date }}

      - name: 执行爬虫 - HSI 期權 OI 牆位
        if: github.event.inputs.backfill_date == ''
        run: python options_oi_crawler.py

      - name: Commit & push 數據回 main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # 加入 CBBC 主文件 + archive
          git add cbbc_distribution.json
          # 加入 Options OI 主文件 + archive
          git add options_oi_distribution.json
          if [ -d "archive" ]; then
            git add archive/
          fi
          if git diff --cached --quiet; then
            echo "ℹ️  數據無變化，跳過 commit"
          else
            date_str=$(date -u +'%Y-%m-%d')
            git commit -m "chore: auto-update CBBC + Options OI ($date_str) [workflow run #${{ github.run_number }}]"
            git push
            echo "✅ 已 push 數據回 main"
          fi

      - name: 部署到 Firebase Hosting
        if: github.event.inputs.backfill_date == ''
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_KEY }}
          channelId: live
          projectId: bull-bear-ratio-record
