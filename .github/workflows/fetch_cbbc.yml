name: 法兴牛熊街货每日更新

on:
  workflow_dispatch:
    inputs:
      backfill_date:
        description: '補捉日期 (YYYY-MM-DD)，留空則執行正常爬蟲'
        required: false
        default: ''

jobs:
  run-crawler:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: pip install requests firebase-admin pandas

      - name: 写入 Firebase 密钥
        run: echo '${{ secrets.FIREBASE_KEY }}' > serviceAccountKey.json

      - name: 执行正常爬虫 (无补单日期)
        if: github.event.inputs.backfill_date == ''
        run: python cbbc_crawler.py

      - name: 执行补单爬虫 (指定日期)
        if: github.event.inputs.backfill_date != ''
        run: python fix_data.py
